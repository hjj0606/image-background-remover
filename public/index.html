<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能抠图 - 一键去除背景</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">AI 智能一键抠图</h1>
            <p class="text-gray-500 mt-2">上传图片，秒变透明背景</p>
        </div>

        <div id="drop-zone" class="border-2 border-dashed border-blue-200 rounded-xl p-10 text-center hover:border-blue-400 transition-colors cursor-pointer bg-blue-50">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div class="space-y-4">
                <div class="text-5xl text-blue-400">🖼️</div>
                <p class="text-gray-600">点击或将图片拖拽到此处</p>
                <p class="text-xs text-gray-400">支持 JPG, PNG (最大 16MB)</p>
            </div>
        </div>

        <div id="result-container" class="mt-8 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <p class="text-sm font-medium text-gray-500 mb-2 text-center">原始图片</p>
                    <img id="original-preview" class="rounded-lg border w-full h-48 object-contain bg-gray-100">
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-500 mb-2 text-center">处理结果</p>
                    <div id="loading-spinner" class="hidden h-48 flex items-center justify-center bg-gray-100 rounded-lg border">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500"></div>
                    </div>
                    <img id="processed-preview" class="hidden rounded-lg border w-full h-48 object-contain bg-[url('https://www.transparenttextures.com/patterns/checkerboard.png')]">
                </div>
            </div>
            
            <div class="mt-6 flex justify-center">
                <a id="download-btn" class="hidden bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition-all shadow-lg transform hover:scale-105 cursor-pointer">
                    下载透明背景图片
                </a>
            </div>
            <div id="error-message" class="mt-4 text-center text-red-500 hidden"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultContainer = document.getElementById('result-container');
        const originalPreview = document.getElementById('original-preview');
        const processedPreview = document.getElementById('processed-preview');
        const loadingSpinner = document.getElementById('loading-spinner');
        const downloadBtn = document.getElementById('download-btn');
        const errorMessage = document.getElementById('error-message');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('请上传图片文件');
                return;
            }

            // Show original preview
            const reader = new FileReader();
            reader.onload = (e) => {
                originalPreview.src = e.target.result;
                resultContainer.classList.remove('hidden');
                processedPreview.classList.add('hidden');
                downloadBtn.classList.add('hidden');
                errorMessage.classList.add('hidden');
                loadingSpinner.classList.remove('hidden');
                
                removeBackground(file);
            };
            reader.readAsDataURL(file);
        }

        async function removeBackground(file) {
            try {
                const formData = new FormData();
                formData.append('image_file', file);
                formData.append('size', 'auto');

                const response = await fetch('/api/remove-bg', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('处理失败，请重试');
                }

                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                
                processedPreview.src = imageUrl;
                processedPreview.classList.remove('hidden');
                downloadBtn.href = imageUrl;
                downloadBtn.download = 'transparent.png';
                downloadBtn.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            } catch (error) {
                showError(error.message);
                loadingSpinner.classList.add('hidden');
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }
    </script>
</body>
</html>
